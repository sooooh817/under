<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Survivor</title>
    <meta name="description" content="Vampire Survivors風の2Dアクションサバイバーゲーム">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="index.html" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="pause-screen" class="hidden">
            <h2>PAUSED</h2>
            <div class="menu-buttons">
                <button id="resumeBtn" class="start-btn">RESUME</button>
                <button id="quitBtn" class="quit-btn">QUIT TO TITLE</button>
            </div>
        </div>

        <div id="start-screen">
            <h1>⚡ Pocket Survivor ⚡</h1>
            <p class="subtitle">四方から迫るモンスターを倒して生き残れ！</p>
            <div class="character-select">
                <h2>キャラクター選択</h2>
                <div class="characters">
                    <button class="char-btn selected" data-type="speed">
                        <img src="assets/sprites/player_speed.png" alt="Speed" class="char-img">
                        <div class="char-info">
                            <span>スピード型</span>
                            <small>でんきショック</small>
                        </div>
                    </button>
                    <button class="char-btn" data-type="tank">
                        <img src="assets/sprites/player_tank.png" alt="Tank" class="char-img">
                        <div class="char-info">
                            <span>タンク型</span>
                            <small>のしかかり</small>
                        </div>
                    </button>
                    <button class="char-btn" data-type="ranged">
                        <img src="assets/sprites/player_ranged.png" alt="Ranged" class="char-img">
                        <div class="char-info">
                            <span>遠距離型</span>
                            <small>みずでっぽう</small>
                        </div>
                    </button>
                </div>
            </div>
            <!-- 認証UI -->
            <div id="auth-panel" class="auth-panel">
                <!-- 匿名状態（初回） -->
                <div id="auth-anonymous" class="auth-section">
                    <button id="googleSignInBtn" class="google-btn">
                        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Googleでアカウント登録
                    </button>
                    <p class="auth-hint">登録するとスコアが記録されます 🏆</p>
                </div>
                <!-- Google連携済み -->
                <div id="auth-google" class="auth-section hidden">
                    <div class="user-info">
                        <img id="user-avatar" src="" alt="avatar" class="user-avatar">
                        <span id="user-displayname" class="user-displayname"></span>
                    </div>
                    <button id="googleSignOutBtn" class="signout-btn">ログアウト</button>
                </div>
            </div>

            <!-- プレイヤー名入力 -->
            <div class="player-name-input">
                <label for="playerName">プレイヤー名</label>
                <input type="text" id="playerName" maxlength="10" placeholder="No name">
            </div>

            <button id="startBtn" class="start-btn">ゲームスタート</button>

            <!-- Volume Control -->
            <div class="volume-control">
                <label for="volumeSlider">BGM Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.3">
            </div>

            <button id="rankingBtn" class="ranking-btn">🏆 ランキング</button>

            <p class="controls">移動: WASD または 矢印キー</p>
        </div>

        <!-- ランキングモーダル -->
        <div id="ranking-modal" class="hidden">
            <div class="ranking-content">
                <h2>🏆 ハイスコアランキング TOP10</h2>
                <ol id="ranking-list">
                    <!-- JSで動的に生成 -->
                </ol>
                <button id="closeRankingBtn" class="start-btn">閉じる</button>
            </div>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <div class="stats">
                <p>スコア: <span id="final-score" style="color: #ffcc00; font-size: 1.3em;">0</span></p>
                <p>ハイスコア: <span id="final-highscore" style="color: #ff6600;">0</span></p>
                <p>生存時間: <span id="final-time">00:00</span></p>
                <p>撃破数: <span id="final-kills">0</span></p>
                <p>到達レベル: <span id="final-level">1</span></p>
            </div>
            <button id="restartBtn" class="start-btn">タイトルに戻る</button>
        </div>
        <div id="game-clear-screen" class="hidden">
            <h1>🌟 GAME CLEAR! 🌟</h1>
            <div id="confetti-container"></div>
            <div class="character-celebration">
                <img id="clear-char-img" src="assets/sprites/player_speed.png" alt="Winner">
            </div>
            <div class="stats">
                <p>スコア: <span id="clear-score" style="color: #ffcc00; font-size: 1.3em;">0</span></p>
                <p>ハイスコア: <span id="clear-highscore" style="color: #ff6600;">0</span></p>
                <p>生存時間: <span id="clear-time">00:00</span></p>
                <p>撃破数: <span id="clear-kills">0</span></p>
                <p>到達レベル: <span id="clear-level">1</span></p>
            </div>
            <button id="clear-restartBtn" class="start-btn">タイトルに戻る</button>
        </div>
        <div id="level-up-screen" class="hidden">
            <h2>⬆ レベルアップ！ ⬆</h2>
            <div class="upgrade-options">
                <!-- JS で動的に生成 -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script src="js/utils/Vector2.js"></script>
    <script src="js/systems/SpriteManager.js"></script>
    <script src="js/systems/SoundManager.js"></script>
    <script src="js/systems/FirebaseManager.js"></script>
    <script src="js/systems/InputManager.js"></script>
    <script src="js/entities/Entity.js"></script>
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Enemy.js"></script>
    <script src="js/entities/ExpGem.js"></script>
    <script src="js/entities/Projectile.js"></script>
    <script src="js/entities/EnemyProjectile.js"></script>
    <script src="js/skills/Skill.js"></script>
    <script src="js/skills/ElectricShock.js"></script>
    <script src="js/skills/BodySlam.js"></script>
    <script src="js/skills/WaterGun.js"></script>
    <script src="js/skills/LeafCutter.js"></script>
    <script src="js/skills/MagicalFlame.js"></script>
    <script src="js/skills/Barrier.js"></script>
    <script src="js/systems/Spawner.js"></script>
    <script src="js/entities/Magnet.js"></script>
    <script src="js/entities/Bomb.js"></script>
    <script src="js/entities/SpiderWeb.js"></script>
    <script src="js/systems/Collision.js"></script>
    <script src="js/ui/HUD.js"></script>
    <script src="js/ui/LevelUpUI.js"></script>
    <script src="js/ui/DamageText.js"></script>
    <script src="js/Game.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
